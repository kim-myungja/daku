spring:
  application:
    name: diary

  datasource:
    # 배포 시 환경변수로 주입, 로컬은 기본값 사용
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:daku}?useUTF8=true&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: ${UPLOAD_DIR:./uploads}

server:
  port: 8080